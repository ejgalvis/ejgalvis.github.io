<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Chalkboard Week 5</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>    
    <!-- Custom CSS to override Bootstrap -->
    <link href="css/DC5_styles.css" rel="stylesheet">
    <!-- Reference JS for Navbar -->
    <script src="https://code.jquery.com/jquery-3.5.0.js"></script>
    <!-- Load custom JS files for functions -->
    <script src="js/DC_5.js"></script>
</head>
<body>
    <!--Nav is loaded here via jQuery-->
    <div id="nav-placeholder"></div>

    <h1>Digital Chalkboard - Week 5</h1>

    <!-- Trivia Form -->
    <div class="task" id="trivia">
        <p>Trivia question</p>
        <p>Q: What is the capital of France?</p>
        <input type="text" id="trivia-answer" placeholder="Your answer">
        <button class="btn btn-primary" onclick="checkTriviaAnswer()" id="trivia-submit">Submit</button>
        <div id="trivia-response"></div>
    </div>

    <!-- Odds/Evens Form -->
    <div class="task" id="number-check">
        <p>Enter a five-digit number e.g. 21954.</p>
        <input type="text" id="number-input" placeholder="5-digit number">
        <button class="btn btn-primary" onclick="checkNumber()" id="number-submit">Submit</button>
        <div id="number-response"></div>
    </div>

    <!-- Reference JS file for Navbar -->
    <script src="../../js/wkly_nav.js"></script>
</body>
</html>
